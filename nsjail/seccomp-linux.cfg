# nsjail seccomp configuration for NATIVE LINUX hosts
#
# This configuration provides MAXIMUM SECURITY with full namespace isolation
# AND seccomp-bpf syscall filtering. Only whitelisted syscalls are allowed.
#
# Use this on native Linux hosts for untrusted code execution.
#
# WARNING: Seccomp filtering may break some Node.js native modules or Python
# packages that use uncommon syscalls. Test your harness with this mode first.
#
# See nsjail/README.md for detailed documentation.

name: "dk_autotester_sandbox_seccomp_linux"
description: "Full namespace isolation + seccomp for native Linux hosts"

# Execution mode: ONCE = run command once and exit
mode: ONCE

# Hostname inside the jail
hostname: "sandbox"

# ============================================================================
# NAMESPACE ISOLATION - ALL ENABLED
# ============================================================================

clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true
clone_newnet: true

# ============================================================================
# RESOURCE LIMITS
# ============================================================================

rlimit_as: 2048
rlimit_cpu_type: SOFT
rlimit_cpu: 600
rlimit_fsize: 1024
rlimit_nofile: 256
rlimit_nproc: 128
rlimit_core: 0
rlimit_stack: 8

# ============================================================================
# FILESYSTEM MOUNTS
# ============================================================================

mount {
    dst: "/"
    fstype: "tmpfs"
    rw: true
    is_bind: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/sbin"
    dst: "/sbin"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/nsswitch.conf"
    dst: "/etc/nsswitch.conf"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/ssl"
    dst: "/etc/ssl"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/ca-certificates"
    dst: "/etc/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=512M"
}

mount {
    dst: "/dev/shm"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=64M"
}

mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
    mandatory: true
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
    rw: false
    mandatory: false
}

# ============================================================================
# CAPABILITIES
# ============================================================================

keep_caps: false
disable_no_new_privs: false

# ============================================================================
# SECCOMP-BPF SYSCALL FILTERING
# ============================================================================

# Use seccomp-bpf to filter syscalls
use_seccomp_log: false

# Seccomp policy using Kafel syntax
# This is a WHITELIST - only listed syscalls are allowed
# All unlisted syscalls will be blocked with EPERM

seccomp_string: "POLICY dkautotester {\n\
  # =========================================================================\n\
  # PROCESS & THREAD MANAGEMENT\n\
  # =========================================================================\n\
  ALLOW {\n\
    # Process lifecycle\n\
    exit, exit_group,\n\
    # Thread creation (needed for Node.js worker threads, Python threading)\n\
    clone, clone3, fork, vfork,\n\
    # Process waiting\n\
    wait4, waitid, waitpid,\n\
    # Execution\n\
    execve, execveat,\n\
    # Process info\n\
    getpid, gettid, getppid, getpgid, getpgrp, getsid,\n\
    setpgid, setsid,\n\
    # Resource limits\n\
    getrlimit, setrlimit, prlimit64,\n\
    getrusage,\n\
    # Scheduling\n\
    sched_yield, sched_getaffinity, sched_setaffinity,\n\
    sched_getscheduler, sched_setscheduler,\n\
    sched_getparam, sched_setparam,\n\
    sched_get_priority_min, sched_get_priority_max,\n\
    # Capabilities (query only)\n\
    capget,\n\
    # Process priority\n\
    getpriority, setpriority,\n\
    # Robust futex list\n\
    set_robust_list, get_robust_list\n\
  }\n\
\n\
  # =========================================================================\n\
  # MEMORY MANAGEMENT\n\
  # =========================================================================\n\
  ALLOW {\n\
    mmap, munmap, mprotect, mremap,\n\
    brk,\n\
    madvise,\n\
    mlock, mlock2, munlock, mlockall, munlockall,\n\
    mincore,\n\
    msync,\n\
    membarrier,\n\
    # Huge pages\n\
    get_mempolicy, set_mempolicy,\n\
    # Memory protection keys (Node.js V8)\n\
    pkey_alloc, pkey_free, pkey_mprotect\n\
  }\n\
\n\
  # =========================================================================\n\
  # FILE OPERATIONS\n\
  # =========================================================================\n\
  ALLOW {\n\
    # Open/close\n\
    open, openat, openat2, close, close_range,\n\
    creat,\n\
    # Read/write\n\
    read, write, pread64, pwrite64,\n\
    readv, writev, preadv, pwritev, preadv2, pwritev2,\n\
    # Positioning\n\
    lseek, llseek, _llseek,\n\
    # File info\n\
    stat, fstat, lstat, newfstatat, statx,\n\
    statfs, fstatfs,\n\
    # Directory operations\n\
    getdents, getdents64,\n\
    mkdir, mkdirat,\n\
    rmdir,\n\
    # File operations\n\
    rename, renameat, renameat2,\n\
    unlink, unlinkat,\n\
    link, linkat,\n\
    symlink, symlinkat,\n\
    readlink, readlinkat,\n\
    # Permissions\n\
    chmod, fchmod, fchmodat,\n\
    chown, fchown, lchown, fchownat,\n\
    access, faccessat, faccessat2,\n\
    umask,\n\
    # File descriptors\n\
    dup, dup2, dup3,\n\
    fcntl,\n\
    flock,\n\
    # Truncate\n\
    truncate, ftruncate,\n\
    # Sync\n\
    fsync, fdatasync, sync, syncfs, sync_file_range,\n\
    # File times\n\
    utime, utimes, futimesat, utimensat,\n\
    # Extended attributes\n\
    getxattr, lgetxattr, fgetxattr,\n\
    listxattr, llistxattr, flistxattr,\n\
    # Copy\n\
    copy_file_range, sendfile,\n\
    # Misc\n\
    fadvise64, readahead,\n\
    fallocate,\n\
    name_to_handle_at, open_by_handle_at\n\
  }\n\
\n\
  # =========================================================================\n\
  # CURRENT WORKING DIRECTORY\n\
  # =========================================================================\n\
  ALLOW {\n\
    getcwd, chdir, fchdir\n\
  }\n\
\n\
  # =========================================================================\n\
  # PIPES & FIFOS\n\
  # =========================================================================\n\
  ALLOW {\n\
    pipe, pipe2,\n\
    splice, tee, vmsplice\n\
  }\n\
\n\
  # =========================================================================\n\
  # POLLING & EVENTS\n\
  # =========================================================================\n\
  ALLOW {\n\
    poll, ppoll, select, pselect6,\n\
    epoll_create, epoll_create1,\n\
    epoll_ctl, epoll_wait, epoll_pwait, epoll_pwait2,\n\
    eventfd, eventfd2,\n\
    signalfd, signalfd4,\n\
    timerfd_create, timerfd_settime, timerfd_gettime,\n\
    inotify_init, inotify_init1, inotify_add_watch, inotify_rm_watch,\n\
    fanotify_init, fanotify_mark\n\
  }\n\
\n\
  # =========================================================================\n\
  # SIGNALS\n\
  # =========================================================================\n\
  ALLOW {\n\
    rt_sigaction, rt_sigprocmask, rt_sigpending,\n\
    rt_sigtimedwait, rt_sigqueueinfo, rt_tgsigqueueinfo,\n\
    rt_sigreturn, rt_sigsuspend,\n\
    sigaltstack,\n\
    kill, tgkill, tkill,\n\
    pause\n\
  }\n\
\n\
  # =========================================================================\n\
  # NETWORKING (allowed, but isolated by network namespace)\n\
  # =========================================================================\n\
  ALLOW {\n\
    socket, socketpair,\n\
    bind, listen, accept, accept4,\n\
    connect,\n\
    getsockname, getpeername,\n\
    getsockopt, setsockopt,\n\
    send, sendto, sendmsg, sendmmsg,\n\
    recv, recvfrom, recvmsg, recvmmsg,\n\
    shutdown,\n\
    # Unix domain sockets\n\
    socketcall\n\
  }\n\
\n\
  # =========================================================================\n\
  # TIME & TIMERS\n\
  # =========================================================================\n\
  ALLOW {\n\
    time, gettimeofday, clock_gettime, clock_getres,\n\
    clock_nanosleep, nanosleep,\n\
    timer_create, timer_settime, timer_gettime,\n\
    timer_getoverrun, timer_delete,\n\
    alarm, setitimer, getitimer\n\
  }\n\
\n\
  # =========================================================================\n\
  # USER & GROUP IDENTITY\n\
  # =========================================================================\n\
  ALLOW {\n\
    getuid, geteuid, getresuid,\n\
    getgid, getegid, getresgid,\n\
    getgroups,\n\
    # These will fail but shouldn't crash\n\
    setuid, seteuid, setresuid,\n\
    setgid, setegid, setresgid,\n\
    setgroups, setreuid, setregid\n\
  }\n\
\n\
  # =========================================================================\n\
  # FUTEX & SYNCHRONIZATION (critical for threading)\n\
  # =========================================================================\n\
  ALLOW {\n\
    futex, futex_waitv,\n\
    set_tid_address,\n\
    semget, semop, semtimedop, semctl,\n\
    shmget, shmat, shmdt, shmctl,\n\
    msgget, msgsnd, msgrcv, msgctl\n\
  }\n\
\n\
  # =========================================================================\n\
  # RANDOM\n\
  # =========================================================================\n\
  ALLOW {\n\
    getrandom\n\
  }\n\
\n\
  # =========================================================================\n\
  # ARCH-SPECIFIC & MISC\n\
  # =========================================================================\n\
  ALLOW {\n\
    arch_prctl,\n\
    prctl,\n\
    seccomp,\n\
    uname,\n\
    sysinfo,\n\
    # Terminal (for npm/test output)\n\
    ioctl,\n\
    # Personality (needed by some programs)\n\
    personality\n\
  }\n\
\n\
  # =========================================================================\n\
  # BLOCKED SYSCALLS (implicit - everything not listed is DENIED)\n\
  # =========================================================================\n\
  # The following dangerous syscalls are NOT whitelisted and will be blocked:\n\
  #\n\
  # - ptrace (process debugging/tracing)\n\
  # - mount, umount, umount2 (filesystem mounting)\n\
  # - pivot_root, chroot (root filesystem changes)\n\
  # - reboot, kexec_load, kexec_file_load (system reboot)\n\
  # - init_module, finit_module, delete_module (kernel modules)\n\
  # - acct (process accounting)\n\
  # - swapon, swapoff (swap management)\n\
  # - sethostname, setdomainname (hostname changes)\n\
  # - iopl, ioperm (I/O port access)\n\
  # - quotactl (disk quotas)\n\
  # - nfsservctl (NFS server)\n\
  # - lookup_dcookie (kernel debugging)\n\
  # - perf_event_open (performance monitoring)\n\
  # - bpf (BPF programs)\n\
  # - userfaultfd (userfault handling)\n\
  # - keyctl, request_key, add_key (kernel keyring)\n\
  # - process_vm_readv, process_vm_writev (cross-process memory)\n\
}\n\
\n\
USE dkautotester DEFAULT KILL\n"
