# nsjail base configuration for NATIVE LINUX hosts
#
# This configuration provides FULL kernel-level isolation using all Linux
# namespaces. Use this on native Linux hosts (not Docker Desktop).
#
# Features enabled:
# - User namespace: UID/GID mapping for unprivileged sandboxing
# - Mount namespace: Isolated filesystem with pivot_root
# - PID namespace: Process isolation (jailed process is PID 1)
# - IPC namespace: Isolated System V IPC and POSIX message queues
# - UTS namespace: Isolated hostname
# - Cgroup namespace: Isolated cgroup view
# - Network namespace: Optional network isolation
#
# See nsjail/README.md for detailed documentation.

name: "dk_autotester_sandbox_linux"
description: "Full namespace isolation for native Linux hosts"

# Execution mode: ONCE = run command once and exit
mode: ONCE

# Hostname inside the jail (prevents hostname leaks)
hostname: "sandbox"

# ============================================================================
# NAMESPACE ISOLATION - ALL ENABLED
# ============================================================================

# User namespace: map container user to nobody inside jail
clone_newuser: true

# Mount namespace: isolated filesystem view with pivot_root
clone_newns: true

# PID namespace: process isolation (jailed process sees itself as PID 1)
clone_newpid: true

# IPC namespace: isolated System V IPC and POSIX message queues
clone_newipc: true

# UTS namespace: isolated hostname and domain name
clone_newuts: true

# Cgroup namespace: isolated cgroup view
clone_newcgroup: true

# Network namespace: controlled by --disable_clone_newnet flag at runtime
# When enabled (default): completely isolated network stack
# When disabled via flag: inherits container network
clone_newnet: true

# ============================================================================
# RESOURCE LIMITS
# ============================================================================

# Virtual memory limit (in MB) - 2GB default
rlimit_as: 2048

# CPU time limit (in seconds) - overridden by --time_limit at runtime
rlimit_cpu_type: SOFT
rlimit_cpu: 600

# Maximum file size (in MB) - 1GB
rlimit_fsize: 1024

# Maximum number of open file descriptors
rlimit_nofile: 256

# Maximum number of processes/threads
rlimit_nproc: 128

# Core dump size (disabled)
rlimit_core: 0

# Stack size (in MB) - 8MB default
rlimit_stack: 8

# ============================================================================
# FILESYSTEM MOUNTS
# ============================================================================

# All mounts are read-only by default for security.
# The repo working directory is mounted read-write at runtime via --bindmount.

# Root filesystem - minimal tmpfs (pivot_root target)
mount {
    dst: "/"
    fstype: "tmpfs"
    rw: true
    is_bind: false
}

# Essential system libraries
mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

# User binaries and libraries
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
    mandatory: true
}

# Essential binaries
mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/sbin"
    dst: "/sbin"
    is_bind: true
    rw: false
    mandatory: false
}

# System configuration (read-only)
mount {
    src: "/etc/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/nsswitch.conf"
    dst: "/etc/nsswitch.conf"
    is_bind: true
    rw: false
    mandatory: false
}

# SSL certificates
mount {
    src: "/etc/ssl"
    dst: "/etc/ssl"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/ca-certificates"
    dst: "/etc/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

# Temporary directories (writable tmpfs)
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=512M"
}

mount {
    dst: "/dev/shm"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=64M"
}

# Proc filesystem - fresh procfs for PID namespace
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

# Minimal /dev
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
    mandatory: true
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
    rw: false
    mandatory: false
}

# ============================================================================
# ADDITIONAL RUNTIME MOUNTS (added via command line)
# ============================================================================
# The following are added dynamically by entrypoint-linux.sh:
#
#   --bindmount_ro /work/harness:/work/harness
#   --bindmount /home/dk_<i>:/home/dk_<i>
#
# ============================================================================

# ============================================================================
# CAPABILITIES
# ============================================================================

# Drop all capabilities - tests run as unprivileged user
keep_caps: false

# ============================================================================
# MISC SETTINGS
# ============================================================================

# Disable kernel exploit protections bypass (keep enabled)
disable_no_new_privs: false
