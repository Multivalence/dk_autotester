# nsjail base configuration - Namespace isolation only (no seccomp)
#
# This configuration provides kernel-level isolation using Linux namespaces
# without syscall filtering. Suitable for most test scenarios where you want
# strong isolation but need full syscall access (e.g., for native modules).
#
# Optimized for running inside Docker containers.
#
# See nsjail/README.md for detailed documentation.

name: "dk_autotester_sandbox"
description: "Namespace isolation for test execution"

# Execution mode: ONCE = run command once and exit
mode: ONCE

# Hostname inside the jail (prevents hostname leaks)
hostname: "sandbox"

# ============================================================================
# NAMESPACE ISOLATION
# ============================================================================

# User namespace: map container user to nobody inside jail
clone_newuser: true

# Mount namespace: isolated filesystem view
clone_newns: true

# PID namespace: DISABLED - conflicts with /proc bind mount inside Docker
# When running inside Docker, the container already provides PID isolation
clone_newpid: false

# IPC namespace: isolated System V IPC and POSIX message queues
clone_newipc: true

# UTS namespace: isolated hostname and domain name
clone_newuts: true

# Cgroup namespace: DISABLED - not needed inside Docker and can cause issues
clone_newcgroup: false

# Network namespace: controlled by --disable_clone_newnet flag at runtime
# When enabled (default): no network access
# When disabled via flag: inherits container network
clone_newnet: true

# ============================================================================
# RESOURCE LIMITS
# ============================================================================

# Virtual memory limit (in MB) - 2GB default
rlimit_as: 2048

# CPU time limit (in seconds) - overridden by --time_limit at runtime
rlimit_cpu_type: SOFT
rlimit_cpu: 600

# Maximum file size (in MB) - 1GB
rlimit_fsize: 1024

# Maximum number of open file descriptors
rlimit_nofile: 256

# Maximum number of processes/threads
rlimit_nproc: 128

# Core dump size (disabled)
rlimit_core: 0

# Stack size (in MB) - 8MB default
rlimit_stack: 8

# ============================================================================
# FILESYSTEM MOUNTS
# ============================================================================

# All mounts are read-only by default for security.
# The repo working directory is mounted read-write at runtime via --bindmount.

# Root filesystem - minimal tmpfs
mount {
    dst: "/"
    fstype: "tmpfs"
    rw: true
    is_bind: false
}

# Essential system libraries
mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
    mandatory: true
}

# /lib64 may not exist in slim images - make it optional
mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

# User binaries and libraries
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
    mandatory: true
}

# Essential binaries
mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/sbin"
    dst: "/sbin"
    is_bind: true
    rw: false
    mandatory: false
}

# System configuration (read-only)
mount {
    src: "/etc/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/nsswitch.conf"
    dst: "/etc/nsswitch.conf"
    is_bind: true
    rw: false
    mandatory: false
}

# SSL certificates - paths vary by distro, make optional
mount {
    src: "/etc/ssl"
    dst: "/etc/ssl"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/etc/ca-certificates"
    dst: "/etc/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

# Temporary directories (writable tmpfs)
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=512M"
}

mount {
    dst: "/dev/shm"
    fstype: "tmpfs"
    rw: true
    is_bind: false
    options: "size=64M"
}

# Proc filesystem - bind mount from container's /proc
# (creating new procfs inside Docker requires additional privileges)
mount {
    src: "/proc"
    dst: "/proc"
    is_bind: true
    rw: false
    mandatory: true
}

# Minimal /dev
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
    mandatory: true
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
    mandatory: true
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
    rw: false
    mandatory: false
}

# ============================================================================
# ADDITIONAL RUNTIME MOUNTS (added via command line)
# ============================================================================
# The following are added dynamically by entrypoint.sh:
#
#   --bindmount_ro /work/harness:/work/harness
#   --bindmount /home/dk_<i>:/home/dk_<i>
#
# ============================================================================

# ============================================================================
# CAPABILITIES
# ============================================================================

# Drop all capabilities - tests run as unprivileged user
keep_caps: false

# ============================================================================
# MISC SETTINGS
# ============================================================================

# Silent mode (reduce noise in logs)
# Note: --quiet flag used at runtime for cleaner output

# Disable kernel exploit protections bypass (keep enabled)
disable_no_new_privs: false
